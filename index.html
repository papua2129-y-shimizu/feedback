<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教師の発話分類</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">授業後の振り返り</p>
        <h1>教師の発話分類</h1>
        <p class="lead">発話を入力すると、言葉がけの種類を6分類から候補表示します。</p>
      </header>

      <section class="entry-panel" aria-labelledby="entry-title">
        <div class="section-heading">
          <h2 id="entry-title">発話を記録</h2>
          <span id="record-count" class="count-pill">0件</span>
        </div>

        <label class="input-label" for="utterance">教師の発話</label>
        <textarea
          id="utterance"
          rows="5"
          placeholder="例: 友達にアドバイスしてみよう"
        ></textarea>
        <p id="input-error" class="error-text" role="alert"></p>

        <div class="actions">
          <button id="classify-button" class="primary-button" type="button">自動分類</button>
          <button id="clear-input-button" class="ghost-button" type="button">入力をクリア</button>
        </div>

        <div id="result-panel" class="result-panel is-hidden" aria-live="polite">
          <div>
            <p class="result-label">分類候補</p>
            <h3 id="result-title"></h3>
            <p id="result-reason" class="result-reason"></p>
          </div>
          <span id="confidence-badge" class="confidence-badge"></span>
        </div>

        <div class="category-area">
          <p class="input-label">分類を修正</p>
          <div id="category-grid" class="category-grid"></div>
        </div>

        <button id="save-button" class="save-button" type="button" disabled>確認して保存</button>
      </section>

      <section class="summary-panel" aria-labelledby="summary-title">
        <div class="section-heading">
          <h2 id="summary-title">振り返り</h2>
          <button id="clear-records-button" class="danger-button" type="button">全削除</button>
        </div>
        <div id="summary-grid" class="summary-grid"></div>
      </section>

      <section class="records-panel" aria-labelledby="records-title">
        <h2 id="records-title">記録一覧</h2>
        <div id="records-list" class="records-list"></div>
      </section>
    </main>

    <template id="record-template">
      <article class="record-item">
        <div class="record-main">
          <span class="record-category"></span>
          <p class="record-text"></p>
          <time class="record-time"></time>
        </div>
        <div class="record-actions">
          <button class="edit-record" type="button">編集</button>
          <button class="delete-record" type="button">削除</button>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
